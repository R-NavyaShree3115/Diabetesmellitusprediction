<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor Animation with Toggle Forms</title>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    /* Reset & Base */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

    body {
      background: #f6faff;
      padding-top: 80px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* Header */
    .header {
      position: fixed; top: 0; width: 100%; height: 70px;
      background: linear-gradient(90deg, #0077b6, #0096c7);
      color: white; display: flex; justify-content: space-between; align-items: center;
      padding: 15px 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); z-index: 1000;
    }
    .logo { font-size: 22px; font-weight: bold; display: flex; align-items: center; }
    .logo i { margin-right: 8px; color: rgb(241, 83, 83); }
    nav ul { list-style: none; display: flex; gap: 40px; }
    nav ul li a { text-decoration: none; color: #fff; font-size: 16px; transition: 0.3s; }
    nav ul li a:hover { color: #ffdd59; }

    /* Container */
    .container {
      display: flex; width: 90%; max-width: 1100px; height: 600px;
      background: #fff; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    /* Left */
    .left {
      width: 40%; background: linear-gradient(to bottom, #e6f4ff, #ffffff);
      display: flex; justify-content: center; align-items: center; flex-direction: column; padding: 20px;
    }
    .doctor img { width: 80%; max-width: 250px; animation: floatDoctor 4s ease-in-out infinite alternate; }
    @keyframes floatDoctor { 0% { transform: translateY(0); } 100% { transform: translateY(-20px); } }

    /* Right */
    .right { flex: 1; padding: 40px; display: flex; flex-direction: column; justify-content: flex-start; }

    /* Sections */
    .sections { display: flex; justify-content: center; gap: 40px; margin-bottom: 20px; }
    .section {
      width: 160px; background: #eaf6ff; text-align: center; padding: 20px;
      border-radius: 10px; font-weight: bold; color: #184d6b; cursor: pointer; transition: 0.3s;
    }
    .section:hover { background: #d6ebfa; transform: scale(1.05); }

    /* Forms */
    .form-box { display: none; }
    .form-box.active { display: block; }

    .form-box h2 { text-align: center; margin-bottom: 20px; color: #184d6b; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-weight: bold; margin-bottom: 5px; color: #184d6b; }
    .form-group input {
      width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px;
    }
    .form-box button {
      width: 100%; padding: 12px; background: #4fa8e0; color: #fff;
      border: none; border-radius: 8px; font-size: 18px; cursor: pointer; transition: 0.3s;
    }
    .form-box button:hover { background: #2b89c6; }
    .switch-link { text-align: center; margin-top: 15px; }
    .switch-link a { color: #4fa8e0; font-weight: bold; cursor: pointer; }

    @media (max-width: 900px) {
      .container { flex-direction: column; height: auto; }
      .left, .right { width: 100%; }
    }

    .form-container {
  display: none;
}
.form-container.active {
  display: block;
}
.form-box {
  display: none;
}
.form-box.active {
  display: block;
}

  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="logo"><i class="fa-solid fa-heartbeat"></i> CareConnect</div>
    <nav>
      <ul>
        <li><a href="#"><i class="fa-solid fa-circle-info"></i> About</a></li>
        <li><a href="#"><i class="fa-solid fa-envelope"></i> Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- Container -->
  <div class="container">
    <!-- Left -->
    <div class="left">
      <div class="doctor">
        <img src="images/doctorwalk.gif" alt="Doctor Animation"><br><br>
        <br>
        <p>Meet our expert doctors</p>
      </div>
    </div>

  <!-- Right -->
<div class="right">
  <!-- Sections -->
  <div class="sections">
    <div class="section" onclick="showForm('patient')">Patient</div>
    <div class="section" onclick="showForm('doctor')">Doctor</div>
  </div>

  <!-- Patient Login/Signin -->
  <div id="patientForms" class="form-container active">
    <!-- Patient Login -->
    <div id="patientLogin" class="form-box active">
      <h2>Patient Login</h2>
      <form action="premium.html" method="get">
        <div class="form-group">
          <label>Email</label>
          <input type="email" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="Enter your password" required>
        </div>
        <button type="submit">Login</button>
      </form>
      <div class="switch-link">
        <p>Don't have an account? <a onclick="toggleSubForm('patientSignin','patientLogin')">Sign In</a></p>
      </div>
    </div>

    <!-- Patient Signin -->
    <div id="patientSignin" class="form-box">
      <h2>Patient Sign In</h2>
      <form>
        <div class="form-group">
          <label>Email</label>
          <input type="email" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="Create a password" required>
        </div>
        <button type="submit">Sign In</button>
      </form>
      <div class="switch-link">
        <p>Already have an account? <a onclick="toggleSubForm('patientLogin','patientSignin')">Login</a></p>
      </div>
    </div>
  </div>

  <!-- Doctor Login/Signin -->
  <div id="doctorForms" class="form-container">
    <!-- Doctor Login -->
    <div id="doctorLogin" class="form-box active">
      <h2>Doctor Login</h2>
      <form>
        <div class="form-group">
          <label>Email</label>
          <input type="email" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="Enter your password" required>
        </div>
        <button type="submit">Login</button>
      </form>
      <div class="switch-link">
        <p>Don't have an account? <a onclick="toggleSubForm('doctorSignin','doctorLogin')">Sign In</a></p>
      </div>
    </div>

    <!-- Doctor Signin -->
    <div id="doctorSignin" class="form-box">
      <h2>Doctor Sign In</h2>
      <form>
        <div class="form-group">
          <label>Email</label>
          <input type="email" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="Create a password" required>
        </div>
        <button type="submit">Sign In</button>
      </form>
      <div class="switch-link">
        <p>Already have an account? <a onclick="toggleSubForm('doctorLogin','doctorSignin')">Login</a></p>
      </div>
    </div>
  </div>
</div>
  <script>
   // Switch between Patient and Doctor forms
  function showForm(type) {
    document.getElementById("patientForms").classList.remove("active");
    document.getElementById("doctorForms").classList.remove("active");

    if (type === "patient") {
      document.getElementById("patientForms").classList.add("active");
    } else {
      document.getElementById("doctorForms").classList.add("active");
    }
  }

  // Switch between Login and Signin inside each role
  function toggleSubForm(showId, hideId) {
    document.getElementById(showId).classList.add("active");
    document.getElementById(hideId).classList.remove("active");
  }

  </script>
</body>
</html>
